<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSV Search</title>
  <link rel="stylesheet" href="css/themes.css">
  <link rel="stylesheet" href="css/main.css">
</head>
<body class="theme-ocean">

  <header class="app-header">
    <h1>CSV Search</h1>
    <div class="theme-picker">
      <label for="theme-select">Theme</label>
      <select id="theme-select">
        <option value="theme-ocean">Ocean</option>
        <option value="theme-dark">Dark</option>
        <option value="theme-forest">Forest</option>
        <option value="theme-sunset">Sunset</option>
        <option value="theme-lavender">Lavender</option>
        <option value="theme-rose">Rose</option>
        <option value="theme-midnight">Midnight</option>
        <option value="theme-arctic">Arctic</option>
        <option value="theme-espresso">Espresso</option>
        <option value="theme-cyber">Cyber</option>
      </select>
    </div>
  </header>

  <div class="card" id="upload-section">
    <div class="source-row">
      <label for="csv-select">Data file</label>
      <select id="csv-select" class="csv-select" disabled>
        <option value="">— Select a file —</option>
      </select>
      <span class="separator">or</span>
      <input type="file" id="csv-file" accept=".csv">
    </div>
    <div id="upload-status" class="info"></div>
  </div>

  <div class="card hidden" id="search-section">
    <label>Search (case-insensitive substring match)</label>
    <div class="search-grid" id="search-fields"></div>
    <div class="btn-row">
      <button class="btn-primary" id="search-btn">Search</button>
      <button class="btn-secondary" id="clear-btn">Clear</button>
    </div>
  </div>

  <div class="card hidden" id="result-section">
    <div id="result-message"></div>
    <div id="result-count" class="row-count"></div>
    <div id="result-table-wrap"></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
